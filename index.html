<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>千问小说创作对话浏览器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;height:100vh;display:flex;flex-direction:column}
.header{background:#1a1a2e;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header h1{font-size:16px;font-weight:600}
.header .stats{font-size:12px;color:#aaa}
.search-box{margin-left:auto;display:flex;gap:8px}
.search-box input{padding:6px 12px;border:1px solid #444;border-radius:6px;background:#2a2a4a;color:#fff;font-size:13px;width:200px}
.search-box input::placeholder{color:#888}
.tabs{display:flex;gap:0;background:#12122a;padding:0 12px;flex-shrink:0;overflow-x:auto;white-space:nowrap}
.tab{padding:10px 16px;cursor:pointer;font-size:12px;color:#888;border-bottom:3px solid transparent;transition:all .2s;flex-shrink:0}
.tab:hover{color:#ccc;background:#1a1a3a}
.tab.active{color:#fff;border-bottom-color:#4a4af0;background:#1a1a2e}
.tab.analysis-tab{color:#f0a040}
.tab.analysis-tab.active{border-bottom-color:#f0a040}
.tab .tab-badge{font-size:10px;background:#4a4af0;color:#fff;padding:1px 6px;border-radius:8px;margin-left:6px}
.tab.active .tab-badge{background:#fff;color:#4a4af0}
.tab.analysis-tab .tab-badge{background:#f0a040;color:#fff}
.tab.analysis-tab.active .tab-badge{background:#fff;color:#f0a040}
.sep-line{width:1px;background:#333;margin:6px 4px;flex-shrink:0}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto;flex-shrink:0}
.sidebar-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s}
.sidebar-item:hover{background:#f8f8ff}
.sidebar-item.active{background:#e8eaff;border-left:3px solid #4a4af0}
.sidebar-item .uid{font-size:11px;color:#666;font-family:monospace;word-break:break-all}
.sidebar-item .meta{font-size:12px;color:#999;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.sidebar-item .meta span{background:#f0f0f0;padding:1px 6px;border-radius:3px}
.content{flex:1;overflow-y:auto;padding:16px 24px}
.welcome{text-align:center;padding:60px 20px;color:#999}
.welcome h2{font-size:20px;margin-bottom:8px;color:#666}
.welcome .ds-info{margin-top:16px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.welcome .ds-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:16px 24px;text-align:left;min-width:200px}
.welcome .ds-card h3{font-size:14px;color:#333;margin-bottom:6px}
.welcome .ds-card p{font-size:12px;color:#888;line-height:1.6}
.conv-item{margin-bottom:16px;border:1px solid #e8e8e8;border-radius:8px;overflow:hidden;background:#fff}
.conv-header{padding:8px 14px;background:#f8f9fa;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;font-size:12px;color:#666;cursor:pointer}
.conv-header:hover{background:#eef}
.conv-header .turn-badge{background:#4a4af0;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.conv-header .time{color:#999}
.conv-header .tags{margin-left:auto;display:flex;gap:4px}
.conv-header .tag{padding:1px 6px;border-radius:3px;font-size:10px}
.tag-voice{background:#e3f2fd;color:#1565c0}
.tag-regen{background:#fce4ec;color:#c62828}
.tag-interrupt{background:#fff3e0;color:#e65100}
.tag-type{background:#e8f5e9;color:#2e7d32}
.conv-body{padding:14px;display:none}
.conv-body.open{display:block}
.q-block{margin-bottom:12px}
.q-label{font-size:11px;font-weight:700;color:#4a4af0;margin-bottom:4px;text-transform:uppercase}
.q-text{font-size:13px;line-height:1.7;color:#333;white-space:pre-wrap;word-break:break-word;background:#f8f9ff;padding:10px 12px;border-radius:6px;border-left:3px solid #4a4af0;max-height:300px;overflow-y:auto}
.r-label{font-size:11px;font-weight:700;color:#2e7d32;margin-bottom:4px;margin-top:8px;text-transform:uppercase}
.r-text{font-size:13px;line-height:1.7;color:#444;white-space:pre-wrap;word-break:break-word;background:#f8fff8;padding:10px 12px;border-radius:6px;border-left:3px solid #2e7d32;max-height:600px;overflow-y:auto}
.session-sep{text-align:center;padding:8px;color:#bbb;font-size:11px;border-top:2px dashed #e0e0e0;margin:16px 0 8px}
.filter-bar{padding:8px 14px;background:#fafafa;border-bottom:1px solid #e0e0e0;display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:3px 10px;border:1px solid #ddd;border-radius:12px;font-size:11px;cursor:pointer;background:#fff;color:#666;transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:#4a4af0;color:#fff;border-color:#4a4af0}
.count-badge{font-size:10px;background:#eee;padding:1px 5px;border-radius:8px;margin-left:4px}
.expand-all{padding:4px 10px;font-size:11px;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer;margin-bottom:10px}
.expand-all:hover{background:#f0f0f0}
.non-novel{opacity:0.5;border-left:3px solid #ccc;background:#fafafa}
.non-novel .conv-header{background:#f0f0f0}
.non-novel .turn-badge{background:#999}
.non-novel .q-text{background:#f5f5f5;border-left-color:#bbb}
.non-novel .r-text{background:#f5f5f5;border-left-color:#bbb}
.tag-non-novel{background:#f3e5f5;color:#6a1b9a}
.novel-toggle{padding:4px 12px;font-size:11px;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer}
.novel-toggle:hover{background:#e8eaff}
.novel-toggle.active{background:#4a4af0;color:#fff;border-color:#4a4af0}

/* Report styles */
.report{max-width:900px;margin:0 auto;padding-bottom:40px}
.report h2{font-size:18px;color:#1a1a2e;margin:24px 0 12px;padding-bottom:6px;border-bottom:2px solid #4a4af0}
.report h3{font-size:15px;color:#333;margin:18px 0 8px}
.report p{font-size:13px;line-height:1.8;color:#444;margin-bottom:8px}
.report ul{margin:4px 0 12px 20px;font-size:13px;line-height:1.8;color:#444}
.report li{margin-bottom:4px}
.report strong{color:#1a1a2e}
.report table{width:100%;border-collapse:collapse;margin:8px 0 16px;font-size:12px}
.report th{background:#f0f0f5;padding:8px 10px;text-align:left;border:1px solid #ddd;font-weight:600;color:#333}
.report td{padding:6px 10px;border:1px solid #eee;color:#555}
.report tr:nth-child(even){background:#fafafa}
.report .insight{background:#fff8e1;border-left:4px solid #f0a040;padding:10px 14px;margin:8px 0 14px;border-radius:0 6px 6px 0;font-size:13px;color:#5d4037}
.report .insight b{color:#e65100}
.report .stat-row{display:flex;gap:12px;margin:8px 0 16px;flex-wrap:wrap}
.report .stat-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 16px;min-width:120px;flex:1}
.report .stat-card .num{font-size:22px;font-weight:700;color:#4a4af0}
.report .stat-card .label{font-size:11px;color:#888;margin-top:2px}
.report .case-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin:8px 0 16px}
.report .case-box h4{font-size:13px;color:#4a4af0;margin-bottom:6px}
.report .case-box .case-meta{font-size:11px;color:#999;margin-bottom:8px}
.report .case-box p{font-size:12px;line-height:1.7;color:#555}
.report .quote{background:#f5f5f5;border-left:3px solid #999;padding:6px 12px;margin:4px 0;font-size:12px;color:#666;font-style:italic}
.report .bar-chart{margin:8px 0 16px}
.report .bar-row{display:flex;align-items:center;margin:2px 0;font-size:11px}
.report .bar-label{width:80px;text-align:right;padding-right:8px;color:#666}
.report .bar-fill{height:18px;background:#4a4af0;border-radius:3px;min-width:2px;transition:width .3s}
.report .bar-val{padding-left:6px;color:#999}
.report .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0 16px}
.report .compare-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px}
.report .compare-card h4{font-size:12px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee}
.report .compare-card.a h4{color:#4a4af0}
.report .compare-card.b h4{color:#e65100}
.report .priority-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;color:#fff;margin-left:4px}
.p0{background:#c62828}.p1{background:#f57c00}.p2{background:#1565c0}
</style>
</head>
<body>
<div class="header">
  <h1>📚 千问小说创作对话浏览器</h1>
  <span class="stats" id="globalStats"></span>
  <div class="search-box" id="searchBox">
    <input type="text" id="searchInput" placeholder="搜索query内容..." oninput="filterUsers()">
  </div>
</div>
<div class="tabs" id="tabBar">
  <div class="tab active" data-tab="hannuota" onclick="switchTab('hannuota')">汉诺塔抽样<span class="tab-badge" id="badge-hannuota">...</span></div>
  <div class="tab" data-tab="yangjie" onclick="switchTab('yangjie')">杨姐抽样100条<span class="tab-badge" id="badge-yangjie">...</span></div>
  <div class="sep-line"></div>
  <div class="tab analysis-tab" data-tab="report-hannuota" onclick="switchTab('report-hannuota')">📊 汉诺塔分析</div>
  <div class="tab analysis-tab" data-tab="report-yangjie" onclick="switchTab('report-yangjie')">📋 杨姐抽样分析</div>
  <div class="tab analysis-tab" data-tab="report-summary" onclick="switchTab('report-summary')">🔍 汇总对比结论</div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar" style="display:none">
    <div class="filter-bar" id="filterBar"></div>
    <div id="userList"></div>
  </div>
  <div class="content" id="content">
    <div class="welcome">
      <h2>千问小说创作数据分析平台</h2>
      <p>上方Tab切换：浏览对话数据 或 查看分析报告</p>
      <div class="ds-info">
        <div class="ds-card"><h3>🔬 汉诺塔抽样</h3><p>随机抽样的小说创作session<br>Top100用户 · 6,513条对话<br>含语音/重新生成/打断等行为指标</p></div>
        <div class="ds-card"><h3>📋 杨姐抽样</h3><p>精选100个小说对话会话<br>98个用户 · 4,473条对话<br>含完整query+response全文</p></div>
        <div class="ds-card"><h3>📊 分析报告</h3><p>两份数据的独立分析<br>+ 交叉验证汇总结论<br>+ 产品改进建议</p></div>
      </div>
    </div>
  </div>
</div>

<script>
const DS_CONFIG = { hannuota:{file:'_nd.json',name:'汉诺塔抽样'}, yangjie:{file:'_nd_100.json',name:'杨姐抽样'} };
let ALL_DATA={}, DATA={}, currentTab='hannuota', currentUser=null, activeFilter=null;

Promise.all(Object.entries(DS_CONFIG).map(([k,c])=>fetch(c.file).then(r=>r.json()).then(d=>{ALL_DATA[k]=d}))).then(()=>{
  for(const[k,d]of Object.entries(ALL_DATA)){
    const u=Object.keys(d), t=u.reduce((s,x)=>s+d[x].length,0);
    document.getElementById('badge-'+k).textContent=u.length+'用户';
  }
  switchTab('hannuota');
});

function switchTab(tab){
  currentTab=tab; currentUser=null; activeFilter=null;
  const si=document.getElementById('searchInput');if(si)si.value='';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const sidebar=document.getElementById('sidebar'), searchBox=document.getElementById('searchBox');

  if(tab==='hannuota'||tab==='yangjie'){
    sidebar.style.display=''; searchBox.style.display='';
    DATA=ALL_DATA[tab]||{};
    init();
    document.getElementById('content').innerHTML=`<div class="welcome"><h2>👈 选择左侧用户查看对话</h2><p>当前数据源：${DS_CONFIG[tab].name}</p></div>`;
  } else {
    sidebar.style.display='none'; searchBox.style.display='none';
    if(tab==='report-hannuota') showReport('hannuota');
    else if(tab==='report-yangjie') showReport('yangjie');
    else if(tab==='report-summary') showReport('summary');
  }
}

function init(){
  const sortedKeys=Object.keys(DATA);
  const total=sortedKeys.reduce((s,u)=>s+DATA[u].length,0);
  document.getElementById('globalStats').textContent=`${DS_CONFIG[currentTab]?.name||''} · ${sortedKeys.length} 用户 | ${total} 条对话`;
  const tc={};
  sortedKeys.forEach(u=>{DATA[u].forEach(r=>{const s=r[6]||'其他';tc[s]=(tc[s]||0)+1})});
  const fb=document.getElementById('filterBar');
  const types=Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,8);
  fb.innerHTML='<span class="filter-btn active" onclick="setTypeFilter(null,event)">全部</span>'+types.map(([t,c])=>`<span class="filter-btn" onclick="setTypeFilter('${escAttr(t)}',event)">${escHtml(t)}<span class="count-badge">${c}</span></span>`).join('');
  renderUserList(sortedKeys);
}
function renderUserList(users){
  let h='';
  users.forEach(u=>{
    const r=DATA[u],ss=new Set(r.map(x=>x[0])),ts=[...new Set(r.map(x=>x[6]).filter(Boolean))],hr=r.some(x=>x[8]>0);
    const us=u.length>20?u.slice(0,10)+'...'+u.slice(-6):u;
    h+=`<div class="sidebar-item" data-uid="${escAttr(u)}" onclick="selectUser('${escAttr(u)}')"><div class="uid">${escHtml(us)}</div><div class="meta"><span>${r.length}轮</span><span>${ss.size}会话</span>${hr?'<span style="background:#fce4ec;color:#c62828">有重试</span>':''}${ts.length?`<span>${escHtml(ts[0])}</span>`:''}</div></div>`;
  });
  document.getElementById('userList').innerHTML=h;
}
function setTypeFilter(t,e){activeFilter=t;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));if(e&&e.target)e.target.classList.add('active');filterUsers()}
function filterUsers(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const allUsers=Object.keys(DATA);
  renderUserList(allUsers.filter(u=>{
    if(q&&!DATA[u].some(r=>(r[4]||'').toLowerCase().includes(q)))return false;
    if(activeFilter&&!DATA[u].some(r=>r[6]===activeFilter))return false;
    return true;
  }));
}
let showNonNovel=true;
function selectUser(uid){
  currentUser=uid;
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.sidebar-item[data-uid="${uid}"]`)?.classList.add('active');
  const records=DATA[uid];if(!records)return;
  const c=document.getElementById('content');
  const ud=uid.length>20?uid.slice(0,12)+'...'+uid.slice(-6):uid;
  const hasNovelFlag=records.length>0&&records[0].length>10;
  const novelCount=hasNovelFlag?records.filter(r=>r[10]===1).length:records.length;
  const nonNovelCount=records.length-novelCount;
  let h=`<div style="margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span style="font-size:13px;color:#666"><strong>${escHtml(ud)}</strong> — 共 ${records.length} 轮${hasNovelFlag?'（小说'+novelCount+'轮 + 其他'+nonNovelCount+'轮）':''}</span><button class="expand-all" onclick="toggleAll(true)">全部展开</button><button class="expand-all" onclick="toggleAll(false)">全部折叠</button>${hasNovelFlag?`<button class="novel-toggle ${showNonNovel?'active':''}" onclick="toggleNonNovel()">${showNonNovel?'🔽 隐藏非小说轮次':'▶ 显示非小说轮次'}</button>`:''}</div>`;
  let ls='';
  records.forEach(r=>{
    const sid=r[0],turn=r[1],tt=r[2],time=r[3],q=r[4],resp=r[5],st=r[6],v=r[7],rg=r[8],it=r[9],isNovel=hasNovelFlag?r[10]:1,intent3=r[11]||'';
    const hidden=!showNonNovel&&!isNovel;
    if(hidden)return;
    if(sid!==ls){h+=`<div class="session-sep">── 会话 ${escHtml(sid)} · 共${tt}轮 ──</div>`;ls=sid}
    const tags=[];
    if(st)tags.push(`<span class="tag ${isNovel?'tag-type':'tag-non-novel'}">${escHtml(isNovel?st:intent3)}</span>`);
    if(!isNovel)tags.push('<span class="tag tag-non-novel">非小说</span>');
    if(v)tags.push('<span class="tag tag-voice">🎤语音</span>');
    if(rg)tags.push(`<span class="tag tag-regen">🔄重新生成×${rg}</span>`);
    if(it)tags.push('<span class="tag tag-interrupt">⏹打断</span>');
    h+=`<div class="conv-item${isNovel?'':' non-novel'}"><div class="conv-header" onclick="this.nextElementSibling.classList.toggle('open')"><span class="turn-badge">第${turn}轮</span><span class="time">${escHtml(time)}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:#555">${escHtml((q||'').slice(0,80))}</span><span class="tags">${tags.join('')}</span></div><div class="conv-body"><div class="q-block"><div class="q-label">📝 用户 Query${isNovel?'':' <span style="color:#999;font-weight:400">（'+escHtml(intent3)+'）</span>'}</div><div class="q-text">${escHtml(q)||'<em style="color:#ccc">（空）</em>'}</div></div><div class="q-block"><div class="r-label">🤖 AI 回复 <span style="font-weight:400;color:#999">(${(resp||'').length}字)</span></div><div class="r-text">${escHtml(resp)||'<em style="color:#ccc">（空回复）</em>'}</div></div></div></div>`;
  });
  c.innerHTML=h;c.scrollTop=0;
}
function toggleNonNovel(){showNonNovel=!showNonNovel;if(currentUser)selectUser(currentUser)}
function toggleAll(o){document.querySelectorAll('.conv-body').forEach(el=>el.classList.toggle('open',o))}
function escHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function escAttr(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ===== REPORTS ===== */
function showReport(type){
  const c=document.getElementById('content');
  document.getElementById('globalStats').textContent='分析报告';
  if(type==='hannuota') c.innerHTML=reportHannuota();
  else if(type==='yangjie') c.innerHTML=reportYangjie();
  else c.innerHTML=reportSummary();
  c.scrollTop=0;
}

function reportHannuota(){return `<div class="report">
<h2>汉诺塔抽样 · 小说创作深度特征分析</h2>
<p>数据来源：汉诺塔session抽样-小说.csv ｜ 三级意图=小说 ｜ 11,295条对话 / 996用户 / 1,000会话</p>
<div class="stat-row">
  <div class="stat-card"><div class="num">11,295</div><div class="label">小说对话总量</div></div>
  <div class="stat-card"><div class="num">996</div><div class="label">独立用户数</div></div>
  <div class="stat-card"><div class="num">1,000</div><div class="label">独立会话数</div></div>
  <div class="stat-card"><div class="num">87.3%</div><div class="label">占文本创作比例</div></div>
</div>

<h3>一、品类地位：小说 = 文本创作</h3>
<p>小说在三级意图中占<strong>11,295条</strong>，远超作文写作(240)、故事(68)、诗歌(54)。在文本创作一级意图下，小说会话覆盖了<strong>100%</strong>。</p>
<div class="insight"><b>关键洞察：</b>文本创作 ≈ 小说创作。千问的文本创作场景产品体验几乎等同于小说创作体验，应将小说作为文本创作的独立赛道运营。</div>

<h3>二、子类型质量矩阵（重新生成率 × 会话深度 × 回复长度）</h3>
<table>
<tr><th>子类型</th><th>对话量</th><th>占比</th><th>会话数</th><th>平均轮次</th><th>中位轮次</th><th>回复均长</th><th>重新生成率</th><th>打断率</th></tr>
<tr><td><b>小说续写</b></td><td>3,696</td><td>33%</td><td>361</td><td><b>40.8轮</b></td><td>18</td><td>1,261字</td><td>8.4%</td><td>1.2%</td></tr>
<tr><td>其他小说</td><td>3,194</td><td>28%</td><td>556</td><td>36.4轮</td><td>11</td><td>1,258字</td><td>8.4%</td><td>3.2%</td></tr>
<tr><td>小说情节</td><td>1,280</td><td>11%</td><td>225</td><td><b>42.3轮</b></td><td>19</td><td>992字</td><td>9.2%</td><td>1.5%</td></tr>
<tr><td><b>同人小说</b></td><td>1,177</td><td>10%</td><td>194</td><td>30.0轮</td><td>7</td><td>1,566字</td><td><b>9.9%</b></td><td>3.0%</td></tr>
